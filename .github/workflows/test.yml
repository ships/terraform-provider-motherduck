name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod verify
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: Unit tests
        run: go test ./internal/client/

  acceptance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Ephemeral resources need >= 1.10
        terraform: ["1.10.*", "1.12.*", "latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - name: Acceptance tests (against in-repo mock API)
        run: go test ./internal/provider/ -v -timeout 10m
        env:
          TF_ACC: "1"
