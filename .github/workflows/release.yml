# Builds, signs, and publishes release artifacts in the layout the Terraform
# Registry expects. Trigger by pushing a semver tag (v0.1.0).
# Requires repo secrets: GPG_PRIVATE_KEY, PASSPHRASE.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    # Upstream's registry release is pure-Go (CGO_ENABLED=0). This fork adds a
    # CGO (go-duckdb) data plane it cannot build, and releases via
    # release-tofu.yml instead, so this job runs only in the upstream repository.
    if: github.repository == 'jpig18/terraform-provider-motherduck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
